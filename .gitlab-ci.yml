# GitLab Pages for Node.js Web App
# Configured to deploy from 'gitlab-pages' branch to keep main branch clean
image: registry.redhat.io/ubi9/nodejs-20:latest
# OR, if that registry image isn't available, use the generic one:
# image: node:20

stages:
  - build
  - deploy

variables:
  NODE_ENV: production
  NODE_OPTIONS: "--max-old-space-size=3072"

# Default settings for all jobs
default:
  tags:
    - itup-alm-x86

# Cache disabled due to S3 upload timeouts in Red Hat GitLab environment
# cache:
#   key: ${CI_COMMIT_REF_SLUG}
#   paths:
#     - .npm/
#   policy: pull-push

build:
  stage: build
  variables:
    KUBERNETES_MEMORY_REQUEST: "2Gi"
    KUBERNETES_MEMORY_LIMIT: "4Gi"
  rules:
    - if: $CI_COMMIT_BRANCH == "feature-stores-entities"
  script:
    - echo "Installing dependencies (including devDependencies for build tools)..."
    - npm ci --include=dev
    - echo "Setting up environment for build..."
    - export PATH="$PWD/node_modules/.bin:$PATH"
    - echo "Verifying build tools are available..."
    - which tsc || echo "TypeScript compiler not found - will use npx fallback"
    - echo "Running build process..."
    - npm run build
    - echo "Preparing files for GitLab Pages..."
    # GitLab Pages expects files in a 'public' directory
    - mv dist public
    # Copy index.html to 404.html for SPA client-side routing support
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "feature-stores-entities"
  script:
    - echo "Deploying to GitLab Pages..."
  artifacts:
    paths:
      - public