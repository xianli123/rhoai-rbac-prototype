# GitLab Pages for Node.js Web App (Vite-based)
# Configured to deploy from '3.2' branch and support branch previews
image: registry.redhat.io/ubi8/nodejs-18:latest

stages:
  - build
  - deploy

variables:
  NODE_ENV: production
  # Default prefix (overridden per branch in job rules)
  PAGES_PREFIX: "branch-$CI_COMMIT_BRANCH"

# Default settings for all jobs
default:
  tags:
    - shared-podman

# Cache disabled due to S3 upload timeouts in Red Hat GitLab environment
# cache:
#   key: ${CI_COMMIT_REF_SLUG}
#   paths:
#     - .npm/
#   policy: pull-push

build:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "3.2"
    - if: $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "3.2"
  script:
    - echo "Installing dependencies (including devDependencies for build tools)..."
    - npm ci --include=dev
    - echo "Setting up environment for build..."
    - export PATH="$PWD/node_modules/.bin:$PATH"
    - echo "Verifying build tools are available..."
    - which tsc || echo "TypeScript compiler not found - will use npx fallback"
    - echo "Running Vite build process..."
    - npm run build
    - echo "Preparing files for GitLab Pages..."
    # GitLab Pages expects files in a 'public' directory
    - |
      if [ -z "$PAGES_PREFIX" ] || [ "$CI_COMMIT_BRANCH" == "3.2" ]; then
        # 3.2 branch or main: files at root
        mv dist public
        echo "Deployed to root"
      else
        # Other branches: create directory structure with branch prefix
        mkdir -p public/${PAGES_PREFIX}
        cp -r dist/* public/${PAGES_PREFIX}/
        echo "Deployed to /${PAGES_PREFIX}/"
      fi
    - echo "Contents of public/:"
    - find public -type f | head -20
  artifacts:
    paths:
      - public

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "3.2"
    - if: $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "3.2"
  script:
    - echo "Deploying to GitLab Pages..."
  artifacts:
    paths:
      - public
  environment:
    name: pages/$CI_COMMIT_BRANCH
    url: $CI_PAGES_URL
